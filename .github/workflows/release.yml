name: Release Metriks

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    
    env:
      SolutionName: ./Metriks.sln
      ProjectPath: ./Src/Metriks.csproj
      TestProjectPath: ./Tests/Metriks.Tests.csproj
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore ${{ env.ProjectPath }}

      - name: Build project
        run: dotnet build ${{ env.ProjectPath }} --configuration Release --no-restore

      - name: Restore Test dependencies
        run: dotnet restore ${{ env.TestProjectPath }}

      - name: Build Test project
        run: dotnet build ${{ env.TestProjectPath }} --configuration Release --no-restore

      - name: Run Test project
        run: dotnet test ${{ env.TestProjectPath }} --configuration Release --no-restore
        
      - name: Pack
        run: dotnet pack ${{ env.ProjectPath }} --configuration Release --no-build --output ./artifacts -p:ContinuousIntegrationBuild=true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./artifacts/*
          generate_release_notes: true