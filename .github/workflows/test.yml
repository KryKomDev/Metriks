# Metriks
# by KryKom with love and care :)

name: Test Metriks

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - 'v*'
    paths:
      - 'Src/**'
      - 'Tests/**'
      - '.github/workflows/test.yml'
  workflow_dispatch:

jobs:
  build:
    strategy:
      matrix:
        configuration: [Debug, Release]
    
    runs-on: ubuntu-latest
    
    env:
      SolutionName: ./Metriks.sln
      ProjectPath: ./Src/Metriks.csproj
      TestProjectPath: ./Tests/Metriks.Tests.csproj
            
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
            fetch-depth: 0
      
      - name: Install .NET Core
        uses: actions/setup-dotnet@v4
        with:
            dotnet-version: 10.0.x
            
      - name: Restore dependencies
        run: dotnet restore ${{ env.ProjectPath }}

      - name: Build project
        run: dotnet build ${{ env.ProjectPath }} --configuration ${{ matrix.configuration }} --no-restore
      
      - name: Restore Test dependencies
        run: dotnet restore ${{ env.TestProjectPath }}
      
      - name: Build Test project
        run: dotnet build ${{ env.TestProjectPath }} --configuration ${{ matrix.configuration }} --no-restore
      
      - name: Execute unit tests
        run: dotnet test ${{ env.TestProjectPath }} --configuration ${{ matrix.configuration }} --no-build
      
      - name: Restore the application
        run: dotnet restore ${{ env.TestProjectPath }}